{extend name="../../base/view/common/base" /}
<!-- 主体 -->
{block name="body"}

<div class="p-page">
	<form class="layui-form gg-form-bar border-t border-x" lay-filter="barsearchform">
		<div class="layui-input-inline" style="width:100px;">
			<select name="status">
				<option value="">状态</option>
				{volist name=":get_status()" id="vo"}
					{gt name="$key" value="0"}
					<option value="{$key}">{$vo}</option>
					{/gt}
				{/volist}
			</select>
		</div>
		<div class="layui-input-inline" style="width:100px;">
			<select name="emergent">
				<option value="">紧急度</option>
				{volist name=":get_emergent()" id="vo"}
					{gt name="$key" value="0"}
					<option value="{$key}">{$vo}</option>
					{/gt}
				{/volist}
			</select>
		</div>
		<div class="layui-input-inline" style="width:100px;">
			<select name="priority">
				<option value="">优先级</option>
				{volist name=":get_priority()" id="vo"}
					{gt name="$key" value="0"}
					<option value="{$key}">{$vo}</option>
					{/gt}
				{/volist}
			</select>
		</div>
		<div class="layui-input-inline" style="width:120px;">
			<select name="cate_id">
				<option value="">问题分类</option>
				{volist name=":get_base_data('problems_cate')" id="vo"}
					<option value="{$vo.id}">{$vo.title}</option>
				{/volist}
			</select>
		</div>
		<div class="layui-input-inline" style="width:100px;">
			<input type="text" name="director" placeholder="指派人" readonly class="layui-input picker-admin" data-type="1" autocomplete="off" />
			<input name="director_id" style="display: none;" value="" />
		</div>
		<div class="layui-input-inline" style="width:300px">
			<input type="text" name="keywords" placeholder="关键字" class="layui-input" autocomplete="off" />
		</div>
		<div class="layui-input-inline" style="width:150px">
			<button class="layui-btn layui-btn-normal" lay-submit="" lay-filter="table-search"><i class="layui-icon layui-icon-search mr-1"></i>搜索</button>
			<button type="reset" class="layui-btn layui-btn-reset" lay-filter="table-reset">清空</button>
		</div>
	</form>
	<table class="layui-hide" id="table_problems" lay-filter="table_problems"></table>
</div>

<script type="text/html" id="toolbarDemo">
  <div class="layui-btn-group">
  	<button class="layui-btn layui-btn-sm tool-add" type="button" data-href="/service/problems/add">+ 添加售后问题</button>
  </div>
</script>

{/block}
<!-- /主体 -->

<!-- 脚本 -->
{block name="script"}
<script>
	const auth = {$auth|default=0};
	const moduleInit = ['tool','tablePlus','oaPicker'];
	function gouguInit() {
		var table = layui.tablePlus, tool = layui.tool;
		
		layui.pageTable = table.render({
			elem: "#table_problems"
			, toolbar: "#toolbarDemo"
			,url: "/service/problems/datalist"
			,excel_auth:auth
			,page: true
			,limit: 20
			,cellMinWidth: 80
			,height: 'full-114'
			,cols: [[
				{field:'id',width:80, title: 'ID号', align:'center'}
				,{ field: 'status', title: '问题状态', align: 'center', width: 90, templet: function (d) {
					var html = '<span class="check-status-color-' + d.status + '">『' + d.status_name + '』</span>';
					return html;
					}
				}
				,{field:'title',title: '问题名称',minWidth:240}
				,{field:'cate',title: '所属分类',width:100,align:'center'}
				,{field:'problem_time',title: '问题日期',width:100,align:'center'}
				,{field:'priority_name',title: '优先级',width:80,align:'center'}
				,{field:'emergent_name',title: '紧急程度',width:80,align:'center'}
				,{field:'customer',title: '关联客户',minWidth:240}
				,{field:'contract',title: '关联合同',minWidth:240}
				,{field:'project',title: '关联项目',minWidth:240}
				,{field:'director_name',title: '指派人',width:80,align:'center'}
				,{field:'finish_time',title: '完成日期',width:100,align:'center'}
				,{field:'admin_name',title: '创建人',width:80,align:'center'}
				,{field:'create_time', title: '创建时间',width:150,align:'center'}
				,{width:120,fixed:'right',title: '操作', align:'center',ignoreExport:true,templet: function(d){
					var html='';
					var btn1='<a class="layui-btn layui-btn-normal layui-btn-xs" lay-event="view">详细</a>';
					var btn2='<a class="layui-btn layui-btn-xs" lay-event="edit">编辑</a>';
					var btn3='<a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</a>';
					html = '<div class="layui-btn-group">'+btn1+btn2+btn3+'</div>';
					return html;
				}}
			]]
		});
			
		table.on('tool(table_problems)',function (obj) {
			var checkStatus = table.checkStatus(obj.config.id); //获取选中行状态
			var data = obj.data;
			if (obj.event === 'view') {
				tool.side("/service/problems/view?id="+data.id);
				return;
			}
			if (obj.event === 'edit') {
				tool.side("/service/problems/add?id="+data.id);
				return;
			}
			if (obj.event === 'del') {
				layer.confirm('确定要删除该内容吗?', { icon: 3, title: '提示' }, function (index) {
					let callback = function (e) {
						layer.msg(e.msg);
						if (e.code == 0) {
							obj.del();
						}
					}
					tool.delete("/service/problems/del", { id: data.id }, callback);
					layer.close(index);
				});
				return;
			}
		});
	}
</script>
{/block}
<!-- /脚本 -->
