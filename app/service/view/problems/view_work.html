<div>
	<table class="layui-hide" id="table_work" lay-filter="table_work"></table>
</div>
<script type="text/html" id="toolbarWork">
    <div class="layui-btn-group">
		<button class="layui-btn layui-btn-sm" lay-event="add">+ 服务记录</button>
	</div>
</script>
<script>
	function view_work() {
		var form = layui.form, tool = layui.tool,table = layui.tablePlus,work = layui.oaWork;
		layui.workTable = table.render({
			elem: "#table_work"
			, toolbar: "#toolbarWork"
			,url: "/service/problemswork/datalist"
			,page: true
			,limit: 20
			,where:{problems_id:problems_id}
			,cellMinWidth: 80
			,cols: [[
				{field:'id',width:80, title: 'ID号', align:'center'}
				,{field:'title',title: '工作内容',minWidth:240}
				,{field: 'director_name', title: '所属人员', align:'center',width:80}
				,{field: 'start_time', title: '工作时间范围', align:'center',width:200,templet:function(d){
					var html=d.start_time_str+' 至 '+d.end_time_str;
					return html;
				}}
				,{field: 'hours', title: '工时', align:'center',width:80}
				,{field: 'work_total', title: '工时费用(元)', align:'center',width:100}
				,{field: 'fee', title: '其它费用(元)', align:'center',width:100}
				,{field: 'amount', title: '总计费用(元)', align:'center',width:100}
				,{field:'admin_name', title: '创建人',width:80,align:'center'}
				,{field:'create_time', title: '创建时间',width:150,align:'center'}
				,{width:120,fixed:'right',title: '操作', align:'center',ignoreExport:true,templet: function(d){
					var html='';
					var btn1='<a class="layui-btn layui-btn-normal layui-btn-xs" lay-event="view">详细</a>';
					var btn2='<a class="layui-btn layui-btn-xs" lay-event="edit">编辑</a>';
					var btn3='<a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</a>';
					html = '<div class="layui-btn-group">'+btn1+'</div>';
					if(d.admin_id == login_admin){
						html = '<div class="layui-btn-group">'+btn1+btn2+btn3+'</div>';
					}
					return html;
				}}
			]]
		});
		 
		//表头工具栏事件
		table.on('toolbar(table_work)', function(obj){
			if (obj.event === 'add') {
				tool.side("/service/problemswork/add?problem_id="+problems_id);
				return;
			}
		});
		
		table.on('tool(table_work)',function (obj) {
			var checkStatus = table.checkStatus(obj.config.id); //获取选中行状态
			var data = obj.data;
			if (obj.event === 'view') {
				tool.side("/service/problemswork/view?id="+data.id);
				return;
			}
			if (obj.event === 'edit') {
				tool.side("/service/problemswork/add?id="+data.id);
				return;
			}
			if (obj.event === 'del') {
				layer.confirm('确定要删除该内容吗?', { icon: 3, title: '提示' }, function (index) {
					let callback = function (e) {
						layer.msg(e.msg);
						if (e.code == 0) {
							obj.del();
						}
					}
					tool.delete("/service/problemswork/del", { id: data.id }, callback);
					layer.close(index);
				});
				return;
			}
		});
	}
</script>
