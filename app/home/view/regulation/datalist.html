{extend name="../../base/view/common/base" /}
{block name="style"}
  <style>
	.tree-left{width:220px; float:left; height:100%; overflow: scroll; border:1px solid #eeeeee; background-color:#fff; padding:12px 12px 12px 5px;}
	.tree-left h3{font-size:16px; height:30px; padding-left:10px; font-weight:800}
  </style>
{/block}
<!-- 主体 -->
{block name="body"}
<div class="p-page" style="height:calc(100% - 40px); box-sizing: border-box;">
	<div class="tree-left">
		<h3>制度分类</h3>
		<div id="cate"></div>
	</div>
	<div class="body-table" style="margin-left:248px; overflow:hidden;">
		<form class="layui-form gg-form-bar border-x border-t">
			<div class="layui-input-inline" style="width:200px;">
				<input type="text" value="" placeholder="请选择适用部门" readonly class="layui-input picker-oa" data-types="department" data-type="1">
				<input type="text" name="dids" value="" style="display:none">
			</div>
			<div class="layui-input-inline" style="width:300px;">
				<input type="text" name="keywords" placeholder="关键字，制度名称/制度内容" class="layui-input" />
			</div>
			<div class="layui-input-inline" style="width:150px;">
				<button class="layui-btn layui-btn-normal" lay-submit="" lay-filter="webform"><i class="layui-icon layui-icon-search mr-1"></i>搜索</button>
				<button type="reset" class="layui-btn layui-btn-reset" lay-filter="reset">重置</button>
			</div>
		</form>
		<table class="layui-hide" id="test" lay-filter="test"></table>
	</div>
</div>
<script type="text/html" id="toolbarDemo">
  <div class="layui-btn-container">
  	<h3>规章制度</h3>
  </div>
</script>
{/block}
<!-- /主体 -->

<!-- 脚本 -->
{block name="script"}
	<script>
	const moduleInit = ['tool','tablePlus','oaPicker'];
	function gouguInit() {
		var table = layui.tablePlus, tool = layui.tool,tree = layui.tree,form = layui.form;
		$.ajax({
			url: "/adm/api/get_regulationcate_tree",
			type:'get',
			success:function(res){					
				//仅节点左侧图标控制收缩
				tree.render({
					elem: '#cate',
					data: res.trees,
					onlyIconControl: true,  //是否仅允许节点左侧图标控制展开收缩
					click: function(obj){
						//layer.msg(JSON.stringify(obj.data));
						$('#cate').find('.layui-tree-main').removeClass('on');
						$(obj.elem).find('.layui-tree-main').eq(0).addClass('on');
						layui.pageTable.reload({
						   where: {cate_id: obj.data.id},
						   page:{curr:1}
						});
						$('[name="keywords"]').val('');
						$('[name="status"]').val('');
						form.render();
					}
				});	
			}
		})
		
		$('[lay-filter="reset"]').click(function(){
			$('#cate').find('.layui-tree-main').removeClass('on');
		});
		
		layui.pageTable = table.render({
			elem: '#test'
			,toolbar: '#toolbarDemo'
			,title:'制度列表'
			,url: "/home/regulation/datalist"
			,is_excel: true
			,cellMinWidth: 60
			,height: 'full-114'
			,cols: [[
				{field:'id',width:80, title: 'ID号', align:'center'}
				,{field:'cate',width:120, title: '制度分类', align:'center'}
				,{field:'title',title: '制度名称',minWidth:240}
				,{field:'use_dnames',width:180, title: '适用部门'}
				,{field:'admin_name',width:90, title: '创建人', align:'center'}
				,{field:'create_time',width:160, title: '创建时间', align:'center'}
				,{width:60,fixed:'right', title: '操作', align:'center',templet: function(d){
					var html='<a class="layui-btn layui-btn-normal layui-btn-xs" lay-event="view">详情</a>';
					return html;
				}}
			]]
		});
		
		table.on('tool(test)',function (obj) {
			if(obj.event === 'view'){					
				tool.side("/home/regulation/view?id="+obj.data.id);
			}
		});
		
		//监听搜索提交
		form.on('submit(webform)', function(data){
			layui.pageTable.reload({where:data.field,page:{curr:1}});
			return false;
		});
	}
	</script>
{/block}
<!-- /脚本 -->
