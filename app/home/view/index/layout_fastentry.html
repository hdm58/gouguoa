<div class="layui-row layui-col-space16">
	<div class="layui-col-md12">
		<div class="layui-card layui-right-bar" style="height:99px;">
			<ul class="p-3">
				<li class="layui-col-xs3" style="border-right:1px solid #eeeeee;">
					<a href="javascript:;" data-href="/oa/workplan/datalist" data-id="264" class="tab-a" data-title="工作计划" style="color:#1e9fff">
						<i class="iconfont icon-zhaopin"></i>
						<cite>工作计划</cite>
					</a>
				</li>
				<li class="layui-col-xs3" style="border-right:1px solid #eeeeee;">
					<a href="javascript:;" data-href="/oa/plan/calendar" data-id="249" class="tab-a" data-title="日程安排" style="color:#16b777">
						<i class="iconfont icon-richengguanli"></i>
						<cite>日程安排</cite>
					</a>
				</li>
				<li class="layui-col-xs3" style="border-right:1px solid #eeeeee;">
					<a href="javascript:;" class="report-add" style="color:#ff5722">
						<i class="iconfont icon-rizhiguanli"></i>
						<cite>+工作汇报</cite>
					</a>
				</li>
				<li class="layui-col-xs3">
					<a href="javascript:;" class="work-add" style="color:#a233c6">
						<i class="iconfont icon-renwujincheng"></i>
						<cite>+工作日志</cite>
					</a>
				</li>
			</ul>
		</div>
	</div>
</div>
<script>
function layoutFastentry(tool,table){
	$('.work-add').on('click',function(){
		tool.box('/oa/schedule/add',"新增工作日志", 820,450,false);
	})
	$('.report-add').on('click',function(){
		var type=[{'id':1,'title':'日报'},{'id':2,'title':'周报'},{'id':3,'title':'月报'}];
		var tablereport;
		layer.open({
			title:'选择汇报类型',
			type:1,
			area:['360px','300px'],
			content:'<div style="width:325px; padding:15px 15px 0"><div id="selectType"></div></div>',
			success:function(){
				tablereport=table.render({
					elem: '#selectType',
					cols: [[ //标题栏
						{type:'radio',title: '选择'},
						{field: 'title', title: '汇报类型'}
					]],
					data: type
				  });			
			},
			btn:['确定'],
			yes: function(idx){
				var checkStatus = table.checkStatus(tablereport.config.id);
				var data = checkStatus.data;
				if(data.length>0){
					tool.side('/oa/work/add?types='+data[0].id);
					layer.close(idx);
				}
				else{
					layer.msg('请选择汇报类型');
					return false;
				}
			}
		})
	});
}
</script>
