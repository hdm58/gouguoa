{extend name="../../base/view/common/base" /}
<!-- 主体 -->
{block name="body"}
<form class="layui-form p-page">
	<h3 class="pb-2">新增制度</h3>
	<table class="layui-table layui-table-form">
		<tr>
			<td class="layui-td-gray">制度标题<font>*</font></td>
			<td><input type="text" name="title" autocomplete="off" placeholder="请输入制度标题" lay-verify="required" lay-reqText="请输入制度标题" class="layui-input"></td>
			<td class="layui-td-gray">制度分类<font>*</font></td>
			<td>
				<select name="cate_id" lay-verify="required" lay-reqText="请选择分类">
					<option value="">请选择分类</option>
					{volist name=":set_recursion(get_base_data('RegulationCate'))" id="v"}
					<option value="{$v.id}">{$v.title}</option>
					{/volist}
				</select>
			</td>
		</tr>
		<tr>
			<td class="layui-td-gray">适用部门</td>
			<td colspan="3">
				<input type="text" name="dnames" value="{$detail.use_didnames|default=''}" placeholder="请选择适用部门，留空为全体公司" readonly class="layui-input picker-oa" data-types="department" data-type="2">
				<input type="hidden" name="use_dids" value="{$detail.use_dids|default=''}">
			</td>
		</tr>
		<tr>
			<td class="layui-td-gray" style="vertical-align:top;">制度内容<font>*</font></td>
			<td colspan="5">
				<textarea name="content" placeholder="请输入内容" class="layui-textarea" id="container" style="border:0;padding:0"></textarea>
			</td>
		</tr>
		<tr>
			<td class="layui-td-gray-2">
				<div class="layui-input-inline">制度附件</div>
				<div class="layui-input-inline">
					<button type="button" class="layui-btn layui-btn-xs" id="uploadBtn"><i class="layui-icon"></i></button>
				</div>
			</td>
			<td colspan="5" style="padding:4px 2px">
				<div class="layui-row" id="uploadBox">
					<input type="hidden" id="fileBoxInput" data-type="file" name="file_ids" value="">
				</div>
			</td>
		</tr> 
	</table>
	<div class="pt-4">
		<button class="layui-btn layui-btn-normal" lay-submit="" lay-filter="webform">立即提交</button>
		<button type="reset" class="layui-btn layui-btn-primary">重置</button>
    </div>
</form>
{/block}
<!-- /主体 -->

<!-- 脚本 -->
{block name="script"}
<script>
const moduleInit = ['tool','tinymce','uploadPlus','oaPicker'];
function gouguInit() {
	var form = layui.form,tool=layui.tool,upload = layui.upload,uploadPlus = layui.uploadPlus;
	
    //编辑器初始化
	var editor = layui.tinymce;
	var edit = editor.render({
		selector: "#container",
		images_upload_url: '/api/index/upload/sourse/tinymce',//图片上传接口
		height: 500
	});	
	
	//附件上传
	var attachment = new uploadPlus({
		"target":'uploadBtn',
		"targetBox":'uploadBox'
	});
	
	//监听提交
	form.on('submit(webform)', function(data){
		data.field.content = tinyMCE.editors['container'].getContent();
		if (data.field.content == '') {
			layer.msg('请先完善制度的描述内容');
			return false;
		}
		let callback = function (e) {
			layer.msg(e.msg);
			if (e.code == 0) {
				tool.sideClose(1000);				
			}
		}
		let clickbtn = $(this);
		tool.post("/adm/regulation/add", data.field, callback,clickbtn);
		return false;
	});
}
</script>
{/block}
<!-- /脚本 -->
