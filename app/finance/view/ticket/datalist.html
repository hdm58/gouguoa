{extend name="../../base/view/common/base" /}
<!-- 主体 -->
{block name="body"}

<div class="p-page">
	<div class="layui-card border-x border-t" style="margin-bottom:0; box-shadow:0 0 0 0 rgb(5 32 96 / 0%)">
		<div class="layui-tabs layui-tab-brief" id="tab">
			<ul class="layui-tabs-header">
				<li class="layui-this">全部</li>
				<li>我申请的</li>
				<li>待我审批</li>
				<li>我已审批</li>
				<li>抄送我的</li>
			</ul>
		</div>
	</div>
	<form class="layui-form gg-form-bar border-x tab-0" id="barsearchform" lay-filter="barsearchform">
		<div class="layui-input-inline  search-item" style="width:124px;">
			<select name="check_status">
				<option value="">选择审批状态</option>
				{volist name=":get_check_status()" id="vo"}
				<option value="{$key}">{$vo}</option>
				{/volist}
			</select>
		</div>
		<div class="layui-input-inline  search-item" style="width:136px;">
			<select name="invoice_type">
				<option value="">发票类型</option>
				<option value="1">增值税专用发票</option>
				<option value="2">增值税普通发票</option>
				<option value="3">其他专业发票</option>
			</select>
		</div>
		<div class="layui-input-inline" style="width:175px;">
			<input type="text" class="layui-input" id="create_time" placeholder="选择申请时间区间" readonly name="create_time">
		</div>
		<div class="layui-input-inline" style="width:175px;">
			<input type="text" class="layui-input" id="open_time" placeholder="选择开票日期区间" readonly name="open_time">
		</div>
		<div class="layui-input-inline  search-item" style="width:100px;">
			<select name="open_status">
				<option value="">发票状态</option>
				<option value="1">正常</option>
				<option value="2">已作废</option>
			</select>
		</div>
		<div class="layui-input-inline  search-item" style="width:100px;">
			<select name="pay_status">
				<option value="">付款状态</option>
				<option value="0">未付款</option>
				<option value="1">部分付款</option>
				<option value="2">已付款</option>
			</select>
		</div>
		<div class="layui-input-inline" style="width:240px;">
			<input type="text" name="keywords" placeholder="开票主体/发票号码" class="layui-input" autocomplete="off" />
		</div>
		<div class="layui-input-inline" style="width:150px">
			<input type="hidden" name="tab" value="0"/>
			<button class="layui-btn layui-btn-normal" lay-submit="" lay-filter="table-search"><i class="layui-icon layui-icon-search mr-1"></i>搜索</button>
			<button type="reset" class="layui-btn layui-btn-reset" lay-filter="table-reset">清空</button>
		</div>
	</form>
	<table class="layui-hide" id="table_ticket" lay-filter="table_ticket"></table>
</div>

<script type="text/html" id="toolbarDemo">
  <div class="layui-btn-container">
  	<button class="layui-btn layui-btn-sm tool-add" type="button" data-href="/finance/ticket/add">新增进项发票申请</button>
  </div>
</script>

{/block}
<!-- /主体 -->

<!-- 脚本 -->
{block name="script"}
<script>
	const auth = {$auth};
	const moduleInit = ['tool','tablePlus','laydatePlus'];
	function gouguInit() {
		var table = layui.tablePlus, tool = layui.tool, laydatePlus = layui.laydatePlus, tabs = layui.tabs, form = layui.form;
		//tab切换
		tabs.on('afterChange(tab)', function(data) {
		    $('[name="tab"]').val(data.index);
			$("#barsearchform")[0].reset();
			$("#barsearchform").attr('class','layui-form gg-form-bar border-x tab-'+data.index);
			let searchObject = form.val('barsearchform');
			layui.pageTable.reload({where:searchObject,page:{curr:1}});
			return false;
		});
		
		//日期范围
		var create_time = new laydatePlus({'target':'create_time'});
		var open_time = new laydatePlus({'target':'open_time'});
		layui.pageTable = table.render({
			elem: "#table_ticket"
			,toolbar: "#toolbarDemo"
			,title: '进项发票列表'
			,url: "/finance/ticket/datalist"
			,page: true
			,limit: 20
			,cellMinWidth: 80
			,height: 'full-155'
			,cols: [[
				{
						field: 'id',
						title: 'ID号',
						align: 'center',
						width: 80
					},{
						field:'check_status',title: '审批状态',width:110, align:'center',templet: function(d){
							var html = '<span class="check-status-color-'+d.check_status+'">『'+d.check_status_str+'』</span>';
							return html;
						}
					},{
						field: 'invoice_title',
						title: '开票主体 [供应商]',
						minWidth: 240
					},{
						field: 'amount',
						title: '发票金额(元)',
						align: 'right',
						width: 100,
					},{
						field: 'code',
						title: '发票号码',
						width: 180
					},{
						field: 'invoice_type',
						title: '发票类型',
						align: 'center',
						width: 120,
						templet:function(d){
							var html='-';
							if(d.invoice_type==1){
								html='<span class="green">增值税专用发票</span>';
							}
							else if(d.invoice_type==2){
								html='<span class="blue">增值税普通发票</span>';
							}
							else if(d.invoice_type==3){
								html='<span class="red">其他专业发票</span>';
							}
							return html;
						}
					},{
						field: 'open_time',
						title: '发票日期',
						align: 'center',
						width: 90
					},{
						field: 'enterprise',
						title: '收票主体',
						width: 180
					},
					{
						field: 'admin_name',
						title: '收票员工',
						align: 'center',
						width: 80
					},{
						field: 'department',
						title: '收票部门',
						align: 'center',
						width: 120
					},{
						field: 'create_time',
						title: '收取时间',
						align: 'center',
						width: 150
					},{
						field: 'check_user',
						title: '当前审核人',
						minWidth: 100
					},{
						field: 'open_status',
						title: '发票状态',
						align: 'center',
						width: 90,
						templet:function(d){
							var html='';
							if(d.check_status==2){
								html = '<span class="green">『正常』</span>';
								if(d.open_status==2){
									html = '<span class="red">『已作废』</span>';
								}
							}
							else{
								html='-';
							}
							return html;
						}
					},{
						field: 'pay_status',
						title: '付款状态',
						align: 'center',
						width: 90,
						templet:function(d){
							var html='';
							if(d.pay_status==0){
								html = '<span class="red">『未付款』</span>';
								if(d.pay_status==1){
									html = '<span class="blue">『部分付款』</span>';
								}
								if(d.pay_status==1){
									html = '<span class="green">『已付款』</span>';
								}
							}
							else{
								html='-';
							}
							return html;
						}
					},{
						field: 'pay_time',
						title: '最新付款日期',
						align: 'center',
						width: 100
					},{
						field: 'right',
						fixed: 'right',
						title: '操作',
						width: 120,
						align: 'center',
						templet:function(d){
							var html='<div class="layui-btn-group">';
							var btn1='<span class="layui-btn layui-btn-normal layui-btn-xs" lay-event="view">详情</span>';
							var btn2='<span class="layui-btn layui-btn-xs" lay-event="edit">编辑</span>';
							var btn3='<span class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</span>';
							var btn4='<span class="layui-btn layui-btn-warm layui-btn-xs" lay-event="tovoid">作废</span>';
							var btn5='<span class="layui-btn layui-btn-danger layui-btn-xs" lay-event="novoid">反作废</span>';
							html+=btn1;
							if((d.check_status==0 ||d.check_status==4) && d.admin_id==login_admin){
								html+=btn2+btn3;
							}
							if(d.check_status==2 && auth==1){
								if(d.open_status==1){
									html+=btn4;
								}
								if(d.open_status==2){
									html+=btn5;
								}
							}
							html+='</div>';
							return html;
						}
					}
				]
			]
		});
			
		table.on('tool(table_ticket)',function (obj) {
			var checkStatus = table.checkStatus(obj.config.id); //获取选中行状态
			var data = obj.data;
			if (obj.event === 'view') {
				tool.side("/finance/ticket/view?id="+data.id);
				return;
			}
			if (obj.event === 'edit') {
				tool.side("/finance/ticket/add?id="+data.id);
				return;
			}
			if (obj.event === 'del') {
				tool.ask('确定要删除该记录吗?', function (index) {
					let callback = function (e) {
						layer.msg(e.msg);
						if (e.code == 0) {
							obj.del();
						}
					}
					tool.delete("/finance/ticket/del", { id: data.id }, callback);
					layer.close(index);
				});
				return;
			}
			if (obj.event === 'tovoid') {
				tool.ask('确定作废该发票吗？', function(index) {
					$.ajax({
						url: "/finance/api/tovoid_ticket",
						type:'post',
						data: {
							id: data.id
						},
						success: function(res) {
							layer.msg(res.msg);
							if (res.code == 0) {
								layui.pageTable.reload();
							}
						}
					})
					layer.close(index);
				});
			}
			if (obj.event === 'novoid') {
				tool.ask('确定反作废该发票吗？', function(index) {
					$.ajax({
						url: "/finance/api/novoid_ticket",
						type:'post',
						data: {
							id: data.id
						},
						success: function(res) {
							layer.msg(res.msg);
							if (res.code == 0) {
								layui.pageTable.reload();
							}
						}
					})
					layer.close(index);
				});
			}
		});
	}
</script>
{/block}
<!-- /脚本 -->
