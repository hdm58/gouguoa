{extend name="../../base/view/common/base" /}
<!-- 主体 -->
{block name="body"}

<div class="p-page">
	<table class="layui-hide" id="table_account" lay-filter="table_account"></table>
</div>

<script type="text/html" id="toolbarDemo">
  <div class="layui-btn-container">
	<button class="layui-btn layui-btn-sm tool-add" type="button" data-href="/finance/account/add">+ 资金账户</button>
  </div>
</script>

{/block}
<!-- /主体 -->

<!-- 脚本 -->
{block name="script"}
<script>
	const moduleInit = ['tool'];
	function gouguInit() {
		var table = layui.table, tool = layui.tool;
		
		layui.pageTable = table.render({
			elem: "#table_account"
			,toolbar: '#toolbarDemo'
			,url: "/finance/account/datalist"
			,page: false
			,totalRow: true
			,limit: 999
			,cellMinWidth: 80
			,cols: [[
				{field:'id',width:80, title: 'ID号', align:'center'}
				,{field:'enterprise',title: '所属企业主体'}
				,{field:'title',title: '资金账户名称'}
				,{field:'account',title: '具体账号',totalRowText: '<div style="text-align:right">合计</div>'}
				,{field:'initial_amount',title: '初始资金(人民币：元)', align:'right','style':'color:#16b777',width:180,totalRow: true}
				,{field:'amount',title: '当前资金(人民币：元)', align:'right','style':'color:#1e9fff',width:180,totalRow: true}
				,{field:'status', title: '状态',width:80,align:'center',templet: function(d){
					var html1='<span class="green">正常</span>';
					var html2='<span class="yellow">禁用</span>';
					if(d.status==1){
						return html1;
					}
					else{
						return html2;
					}
				}}
				,{width:100,fixed:'right', title: '操作', align:'center',ignoreExport:true,templet: function(d){
					var html='';
					var btn='<a class="layui-btn layui-btn-normal layui-btn-xs" lay-event="edit">编辑</a>';
					var btn1='<a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="disable">禁用</a>';
					var btn2='<a class="layui-btn layui-btn-xs" lay-event="open">启用</a>';
					if(d.status==1){
						html = '<div class="layui-btn-group">'+btn+btn1+'</div>';
					}
					else{
						html = '<div class="layui-btn-group">'+btn+btn2+'</div>';
					}
					return html;
				}}
			]]
		});
			
		table.on('tool(table_account)',function (obj) {
			let data = obj.data;
			if (obj.event === 'view') {
				tool.side("/finance/account/view?id="+data.id);
				return;
			}
			if (obj.event === 'edit') {
				tool.side("/finance/account/add?id="+data.id);
				return;
			}
			if(obj.event === 'disable'){
				layer.confirm('确定要禁用该账户吗?', {icon: 3, title:'提示'}, function(index){
					let callback = function (e) {
						layer.msg(e.msg);
						if (e.code == 0) {
							layui.pageTable.reload();
						}
					}
					tool.post("/finance/account/set", {id:obj.data.id,status: 0}, callback);
					layer.close(index);
				});
			}
			if(obj.event === 'open'){
				layer.confirm('确定要启用该账户吗?', {icon: 3, title:'提示'}, function(index){
					let callback = function (e) {
						layer.msg(e.msg);
						if (e.code == 0) {
							layui.pageTable.reload();
						}
					}
					tool.post("/finance/account/set", {id:obj.data.id,status:1}, callback);
					layer.close(index);
				});
			}
		});
	}
</script>
{/block}
<!-- /脚本 -->
