{extend name="../../base/view/common/base" /}
<!-- 主体 -->
{block name="body"}
<div class="p-page">
	<div class="layui-card border-x border-t" style="margin-bottom:0; box-shadow:0 0 0 0 rgb(5 32 96 / 0%)">
		<div class="layui-tabs layui-tab-brief" id="tab">
			<ul class="layui-tabs-header">
				<li class="layui-this">全部</li>
				<li>我申请的</li>
				<li>待我审批</li>
				<li>我已审批</li>
				<li>抄送我的</li>
			</ul>
		</div>
	</div>
	<form class="layui-form gg-form-bar border-x tab-0" id="barsearchform" lay-filter="barsearchform">
		<div class="layui-input-inline search-item" style="width:124px;">
			<select name="check_status">
				<option value="">选择审批状态</option>
				{volist name=":get_check_status()" id="vo"}
				<option value="{$key}">{$vo}</option>
				{/volist}
			</select>
		</div>
		<div class="layui-input-inline search-item" style="width:136px;">
			<select name="fundscate_id">
				<option value="">收款类型</option>
				{volist name=":get_base_data('funds_cate')" id="vo"}
				<option value="{$vo.id}">{$vo.title}</option>
				{/volist}
			</select>
		</div>
		<div class="layui-input-inline search-item" style="width:100px;">
			<select name="paytype_id">
				<option value="">收款方式</option>
				{volist name=":get_base_data('pay_type')" id="vo"}
				<option value="{$vo.id}">{$vo.title}</option>
				{/volist}	
			</select>
		</div>
		<div class="layui-input-inline search-item" style="width:100px;">
			<select name="status">
				<option value="">确认状态</option>
				<option value="1">未确认</option>
				<option value="2">已确认</option>
			</select>
		</div>
		<div class="layui-input-inline" style="width:175px;">
			<input type="text" class="layui-input" id="create_time" placeholder="选择申请时间区间" readonly name="create_time">
		</div>
		<div class="layui-input-inline" style="width:175px;">
			<input type="text" class="layui-input" id="enter_time" placeholder="选择收款时间区间" readonly name="enter_time">
		</div>
		<div class="layui-input-inline" style="width:150px">
			<input type="hidden" name="tab" value="0"/>
			<button class="layui-btn layui-btn-normal" lay-submit="" lay-filter="table-search"><i class="layui-icon layui-icon-search mr-1"></i>搜索</button>
			<button type="reset" class="layui-btn layui-btn-reset" lay-filter="table-reset">清空</button>
		</div>
	</form>
	<table class="layui-hide" id="test" lay-filter="test"></table>
</div>
<script type="text/html" id="toolbarDemo">
  <div class="layui-btn-container">
  	<button class="layui-btn layui-btn-sm tool-add" type="button" data-href="/finance/income/add">+ 添加收款记录</button>
  </div>
</script>
{/block}
<!-- /主体 -->

<!-- 脚本 -->
{block name="script"}
<script>
	const auth = {$auth};
	const moduleInit = ['tool','tablePlus','laydatePlus'];
	function gouguInit() {
		var table = layui.tablePlus, tool = layui.tool, laydatePlus = layui.laydatePlus, tabs = layui.tabs, form = layui.form;
		//tab切换
		tabs.on('afterChange(tab)', function(data) {
		    $('[name="tab"]').val(data.index);
			$("#barsearchform")[0].reset();
			$("#barsearchform").attr('class','layui-form gg-form-bar border-x tab-'+data.index);
			let searchObject = form.val('barsearchform');
			layui.pageTable.reload({where:searchObject,page:{curr:1}});
			return false;
		});
		
		//日期范围
		var create_time = new laydatePlus({'target':'create_time'});
		var enter_time = new laydatePlus({'target':'enter_time'});
		
		layui.pageTable = table.render({
			elem: "#test"
			,toolbar: "#toolbarDemo"
			,url: "/finance/income/datalist"
			,page: true
			,limit: 20
			,cellMinWidth: 80
			,height: 'full-154'
			,cellMinWidth: 80		
			,page: true //开启分页
			,limit: 20
			,cols: [[
					{
						field: 'id',
						title: 'ID号',
						align: 'center',
						width: 80
					},{
						field:'check_status',title: '审批状态',width:110, align:'center',templet: function(d){
							var html = '<span class="check-status-color-'+d.check_status+'">『'+d.check_status_str+'』</span>';
							return html;
						}
					},{
						field: 'amount',
						title: '收款金额(元)',
						align: 'right',
						width: 100,
					},{
						field: 'enter_time',
						title: '收款时间',
						align: 'center',
						width: 136
					},{
						field: 'transaction_code',
						minWidth: 200,	
						title: '收款交易单号'
					},{
						field: 'invoice',
						minWidth: 200,	
						title: '关联销项发票号'
					},{
						field: 'contract',
						title: '关联销售合同',
						minWidth: 200
					},{
						field: 'customer',
						title: '关联客户',
						minWidth: 200
					},{
						field: 'project',
						title: '关联项目',
						minWidth: 200
					},{
						field: 'fundscate',
						title: '收款类型',
						align: 'center',
						width: 80
					},{
						field: 'paytype',
						title: '收款方式',
						align: 'center',
						width: 90
					},{
						field: 'subject',
						title: '收款主体',
						minWidth: 200
					},{
						field: 'status',
						title: '确认状态',
						align: 'center',
						width: 90,
						templet:function(d){
							var html='<span class="red">『未确认』</span>';
							if(d.status==2){
								html='<span class="green">『已确认』</span>';
							}
							return html;
						}
					},{
						field: 'admin_name',
						title: '申请人',
						align: 'center',
						width: 80
					},{
						field: 'department',
						title: '所属部门',
						align: 'center',
						width: 100
					},{
						field: 'create_time',
						title: '申请时间',
						align: 'center',
						width: 150
					},{
						field: 'check_user',
						title: '当前审核人',
						minWidth: 100
					},{
						field: 'right',
						fixed: 'right',
						title: '操作',
						width: 160,
						align: 'center',
						templet:function(d){
							var html='<div class="layui-btn-group">';
							var btn1='<span class="layui-btn layui-btn-normal layui-btn-xs" lay-event="view">详情</span>';
							var btn2='<span class="layui-btn layui-btn-xs" lay-event="edit">编辑</span>';
							var btn3='<span class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</span>';
							var btn4='<span class="layui-btn layui-btn-warm layui-btn-xs" lay-event="confirm">到账确认</span>';
							var btn5='<span class="layui-btn layui-btn-danger layui-btn-xs" lay-event="noconfirm">反确认到账</span>';
							var btn6='<span class="layui-btn layui-btn-warm layui-btn-xs" lay-event="refund">退款</span>'
							html+=btn1;
							if((d.check_status==0 ||d.check_status==4) && d.admin_id==login_admin){
								html+=btn2+btn3;
							}
							if(d.check_status==2 && auth==1){
								if(d.status==1){
									html+=btn4;
								}
								if(d.status==2){
									html+=btn5;
								}
							}
							if((d.check_status==2) && d.status==2 && d.admin_id==login_admin && d.back_status<2){
								html+=btn6;
							}
							html+='</div>';
							return html;
						}
					}
				]
			]
		});
		//监听行工具事件
		table.on('tool(test)', function(obj) {
			var data = obj.data;
			if (obj.event === 'edit') {
				tool.side("/finance/income/add?id="+data.id);
				return;
			}
			if (obj.event === 'view') {
				tool.side("/finance/income/view?id="+data.id);
				return;
			}
			if (obj.event === 'refund') {
				tool.side("/finance/refund/add?income_id="+data.id);
				return;
			}
			if (obj.event === 'del') {
				tool.ask('确定要删除该内容吗?', function (index) {
					let callback = function (e) {
						layer.msg(e.msg);
						if (e.code == 0) {
							obj.del();
						}
					}
					tool.delete("/finance/income/del", { id: data.id }, callback);
					layer.close(index);
				});
				return;
			}
			if (obj.event === 'confirm') {
				tool.ask('确定要确认该收款记录到账吗?', function (index) {
					let callback = function (e) {
						layer.msg(e.msg);
						if (e.code == 0) {
							layui.pageTable.reload();
						}
					}
					tool.post("/finance/api/confirm_income", { id: data.id }, callback);
					layer.close(index);
				});
				return;
			}
			if (obj.event === 'noconfirm') {
				tool.ask('确定要反确认到账该收款记录吗?', function (index) {
					let callback = function (e) {
						layer.msg(e.msg);
						if (e.code == 0) {
							layui.pageTable.reload();
						}
					}
					tool.post("/finance/api/unconfirm_income", { id: data.id }, callback);
					layer.close(index);
				});
				return;
			}
		});
	}
</script>
{/block}
<!-- /脚本 -->
