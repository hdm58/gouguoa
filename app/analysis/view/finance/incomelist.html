{extend name="../../base/view/common/base" /}
<!-- 主体 -->
{block name="body"}

<div class="p-page">
	<form class="layui-form gg-form-bar border-t border-x" id="barsearchform">
		<div class="layui-input-inline" style="width:175px;">
			<input type="text" class="layui-input" id="create_time" placeholder="选择流水时间" readonly name="create_time">
		</div>
		<div class="layui-input-inline" style="width:150px">
			<button class="layui-btn layui-btn-normal" lay-submit="" lay-filter="table-search"><i class="layui-icon layui-icon-search mr-1"></i>搜索</button>
			<button type="reset" class="layui-btn layui-btn-reset" lay-filter="table-reset">清空</button>
		</div>
	</form>
	<table class="layui-hide" id="test" lay-filter="test"></table>
</div>
<script type="text/html" id="toolbarDemo">
<div class="layui-btn-container">
    <h3 class="h3-title" style="height:32px;">收入流水</h3>
</div>
</script>
{/block}
<!-- /主体 -->

<!-- 脚本 -->
{block name="script"}
<script>
	const moduleInit = ['tool','tablePlus','laydatePlus'];
	function gouguInit() {
		var form = layui.form,table = layui.tablePlus,tool=layui.tool, laydatePlus = layui.laydatePlus;
		//日期范围
		var create_time = new laydatePlus({'target':'create_time'});

		layui.pageTable = table.render({
			elem: '#test',
			title: '收入流水',
			toolbar: '#toolbarDemo',
			url: "/analysis/finance/incomelist", //数据接口	
			cellMinWidth: 80,			
			page: true, //开启分页
			limit: 20,
			totalRow: true,
			height: 'full-115',
			cols: [
				[
					{
						field: 'id',
						title: 'ID号',
						align: 'center',
						width: 80
					},{
						field: 'transaction_no',
						title: '流水号',
						align: 'center',
						width: 160,
						totalRowText: '<div style="text-align:right">合计</div>'
					}, {
						field: 'amount',
						title: '金额(元)',
						align: 'right',
						style:'color:#1e9fff',
						width: 120,
						totalRow: function (d) {return d.TOTAL_ROW.amount}
					},{
						field: 'title',
						title: '收入类型',
						align: 'center',
						width: 100
					},{
						field: 'fundscate',
						title: '款项类型',
						align: 'center',
						width: 120
					},{
						field: 'enterprise',
						title: '企业主体',
						minWidth: 180
					},{
						field: 'account',
						title: '收入账户',
						width: 180
					},{
						field: 'paytype',
						title: '收款方式',
						align: 'center',
						width: 120
					},{
						field: 'admin_name',
						title: '经手人',
						align: 'center',
						width: 90
					},{
						field: 'create_time',
						title: '流水时间',
						align: 'center',
						width: 150
					}
				]
			]
		});
	}
</script>
{/block}
<!-- /脚本 -->
