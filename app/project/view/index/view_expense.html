<div class="bg-white">
	<table class="layui-hide" id="expense" lay-filter="expense"></table>
</div>
<script type="text/html" id="toolbarexpense">
	<div class="layui-btn-container">
		<span class="yellow">如需创建报销记录，请到【财务管理】的【报销管理】创建</span>
	</div>
</script>
<script>
function project_expense(){
	if($('#projectTab').find('li').eq(5).data('load') =='true'){
		return false;
	}
	$('#projectTab').find('li').eq(5).data('load','true');
	let tool = layui.tool, table = layui.tablePlus;
	//项目任务
	parent.layui.expenseTable = table.render({
		elem: '#expense',
		title: '报销列表',
		toolbar: '#toolbarexpense',
		cellMinWidth:80,
		url: "/finance/api/get_expense",
		where:{'project_id':project_id},
		page: true, //开启分页
		limit: 50,
		totalRow: true,
		cols: [[
				{
					field:'check_status',title: '审批状态',width:110, align:'center', templet: function(d){
						var html = '<span class="check-status-color-'+d.check_status+'">『'+d.check_status_str+'』</span>';
						return html;
					}
				},{
					field: 'admin_name',
					title: '报销员工',
					align: 'center',
					width: 90,
					totalRow: '合计'
				},{
					field: 'cost',
					title: '报销金额(元)',
					align: 'right',
					width: 100,
					totalRow: '{{= d.TOTAL_NUMS.toFixed(2) }}'
				},
				{
					field: 'code',
					title: '报销凭证编号',
					align: 'center',
					width: 150,
				},{
					field: 'expense_time',
					title: '原始单据日期',
					align: 'center',
					width: 110
				},{
					field: 'income_month_str',
					title: '入账月份',
					align: 'center',
					width: 80
				},{
					field: 'create_time',
					title: '录入时间',
					align: 'center',
					width: 150
				},{
					field: 'check_user',
					title: '当前审核人',
					minWidth: 120
				},{
					field: 'status',
					title: '打款状态',
					align: 'center',
					width: 80,
					templet:function(d){
						var html='-';
						if(d.check_status==2){
							html = '<span class="red">未打款</span>';
							if(d.status==2){
								html = '<span class="green">已打款</span>';
							}
						}
						return html;
					}
				},{
					field: 'confirm_admin',
					title: '打款/确认人',
					align: 'center',
					width: 100
				},{
					field: 'confirm_time',
					title: '打款/确认时间',
					align: 'center',
					width: 150
				},{
					field: 'right',
					fixed: 'right',
					title: '操作',
					width: 60,
					align: 'center',
					templet:function(d){
						var btn1='<span class="layui-btn layui-btn-normal layui-btn-xs" lay-event="view">详情</span>';
						return btn1;
					}
				}
			]
		]
	});
	
	table.on('tool(expense)', function(obj){
		var data = obj.data; //获得当前行数据		
		if(obj.event === 'view'){ //查看
			let url = '/finance/expense/view/id/'+data.id;
			tool.side(url);
		}
	})
}
</script>
