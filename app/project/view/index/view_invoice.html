<div class="bg-white">
	<table class="layui-hide" id="invoice" lay-filter="invoice"></table>
</div>
<script type="text/html" id="toolbarinvoice">
	<div class="layui-btn-container">
		<span class="yellow">如需创建销项发票记录，请到【财务管理】的【销项发票】创建</span>
	</div>
</script>
<script>
function project_invoice(){
	if($('#projectTab').find('li').eq(6).data('load') =='true'){
		return false;
	}
	$('#projectTab').find('li').eq(6).data('load','true');
	let tool = layui.tool, table = layui.tablePlus;
	//项目任务
	parent.layui.invoiceTable = table.render({
		elem: '#invoice',
		title: '销项发票列表',
		toolbar: '#toolbarinvoice',
		cellMinWidth:80,
		url: "/finance/api/get_invoice",
		where:{'project_id':project_id},
		page: true, //开启分页
		limit: 20,
		cols: [[
					{
						field: 'amount',
						title: '发票金额(元)',
						align: 'right',
						width: 100,
					},{
						field: 'invoice_type',
						title: '开票类型',
						align: 'center',
						width: 120,
						templet:function(d){
							var html='-';
							if(d.invoice_type==1){
								html='<span class="green">增值税专用发票</span>';
							}
							else if(d.invoice_type==2){
								html='<span class="blue">增值税普通发票</span>';
							}
							else if(d.invoice_type==3){
								html='<span class="red">其他专业发票</span>';
							}
							return html;
						}
					},{
						field: 'invoice_title',
						title: '开票抬头',
						minWidth: 240,	
						templet:function(d){
							var html='<span class="layui-badge layui-bg-blue">企业</span> '+d.invoice_title;
							if(d.types==2){
								html='<span class="layui-badge layui-bg-green">个人</span> '+d.invoice_title;
							}
							return html;
						}
					},
					{
						field: 'admin_name',
						title: '申请员工',
						align: 'center',
						width: 80
					},{
						field: 'department',
						title: '申请部门',
						align: 'center',
						width: 100
					},{
						field: 'create_time',
						title: '申请时间',
						align: 'center',
						width: 150
					},{field:'check_status',title: '审批状态',width:100, align:'center',templet: function(d){
							var html = '<span class="check-status-color-'+d.check_status+'">『'+d.check_status_str+'』</span>';
							return html;
						}
					},{
						field: 'check_user',
						title: '当前审核人',
						width: 120
					},{
						field: 'open_status',
						title: '开票状态',
						align: 'center',
						width: 90,
						templet:function(d){
							var html='';
							if(d.check_status==2){
								html = '<span class="red">『未开票』</span>';
								if(d.open_status==1){
									html = '<span class="green">『已开票』</span>';
								}
							}
							else{
								html='-';
							}
							return html;
						}
					},{
						field: 'open_name',
						title: '开票人',
						align: 'center',
						width: 90
					},{
						field: 'open_time',
						title: '开票日期',
						align: 'center',
						width: 100
					},{
						field: 'code',
						title: '发票号码',
						width: 180
					},{
					field: 'right',
					fixed: 'right',
					title: '操作',
					width: 60,
					align: 'center',
					templet:function(d){
						var btn1='<span class="layui-btn layui-btn-normal layui-btn-xs" lay-event="view">详情</span>';
						return btn1;
					}
				}
			]
		]
	});
	
	table.on('tool(invoice)', function(obj){
		var data = obj.data; //获得当前行数据		
		if(obj.event === 'view'){ //查看
			let url = '/finance/invoice/view/id/'+data.id;
			tool.side(url);
		}
	})
}
</script>
